name: no_std Targets

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build ${{ matrix.package }} on ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
          - thumbv7em-none-eabihf
          - wasm32-wasip1
        package:
          - leit_core
          - leit_score
          - leit_query
          - leit_text
          - leit_postings
          - leit_fusion
          - leit_collect
          - leit_index
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build crate without std
        run: cargo build -p ${{ matrix.package }} --no-default-features --target ${{ matrix.target }}
